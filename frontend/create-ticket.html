<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WOMAN - Create Work Order</title>
    <link rel="stylesheet" href="style.css">
</head>
<body style="background-color: #f4f7f6; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0;">

    <div class="card" style="background: white; padding: 30px; border-radius: 10px; box-shadow: 0 4px 15px rgba(0,0,0,0.1); width: 100%; max-width: 450px;">
        <h2 style="color: #004a99; margin-top: 0; text-align: center;">New Work Order</h2>
        <p style="text-align: center; color: #666; font-size: 14px;">Fill up the details for the technician.</p>
        <hr style="border: 0; border-top: 1px solid #eee; margin: 20px 0;">

        <form id="createForm">
            <div style="margin-bottom: 15px;">
                <label style="display: block; font-weight: bold; margin-bottom: 5px;">Problem / Issue:</label>
                <textarea id="issue" placeholder="Describe the problem..." required 
                    style="width: 100%; padding: 10px; height: 100px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box;"></textarea>
            </div>
            
            <div style="margin-bottom: 20px;">
                <label style="display: block; font-weight: bold; margin-bottom: 5px;">Assign Technician:</label>
                <input type="text" id="technician" placeholder="Enter name" required 
                    style="width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 5px; box-sizing: border-box;">
            </div>

            <button type="submit" id="submitBtn" style="width: 100%; background-color: #28a745; color: white; padding: 12px; border: none; border-radius: 5px; cursor: pointer; font-weight: bold; font-size: 16px;">
                SUBMIT WORK ORDER
            </button>
            
            <div style="text-align: center; margin-top: 15px;">
                <a href="tickets.html" style="color: #004a99; text-decoration: none; font-size: 14px;">← Back to Logs</a>
            </div>
        </form>
    </div>

    <script>
        document.getElementById('createForm').onsubmit = async (e) => {
            e.preventDefault();
            
            // Disable button para dili ma-doble og click
            const btn = document.getElementById('submitBtn');
            btn.innerText = "Sending...";
            btn.disabled = true;

            const ticketData = {
                issue: document.getElementById('issue').value,
                technician: document.getElementById('technician').value,
                priority: 'Medium' // Default priority
            };

            try {
                const response = await fetch('http://localhost:5000/api/tickets', {
                    method: 'POST',
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(ticketData)
                });

                const result = await response.json();
                
                if(result.success) {
                    alert("✅ Success: Work Order Created!");
                    window.location.href = "tickets.html"; 
                } else {
                    alert("❌ Error: " + (result.error || "Failed to create ticket"));
                    btn.innerText = "SUBMIT WORK ORDER";
                    btn.disabled = false;
                }
            } catch (error) {
                console.error("Connection Error:", error);
                alert("❌ Connection Error! Please make sure your server.js is running.");
                btn.innerText = "SUBMIT WORK ORDER";
                btn.disabled = false;
            }
        };
    </script>
</body>
</html>
