<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMSI - Management Dashboard</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">
            <img src="logo.png" alt="SMSI Logo">
        </div>
        <div class="nav-buttons">
            <a href="index.html" class="btn">Home</a>
            <a href="tickets.html" class="btn">Tickets Log</a>
            <a href="management.html" class="btn active-page">Management</a>
            <a href="technician.html" class="btn">Technician</a>
            <a href="response.html" class="btn">Response</a>
            <a href="activity.html" class="btn">Activity Log</a>
        </div>
    </nav>

    <div class="content">
        <h1>Management Dashboard</h1>
        
        <div class="dashboard-info" style="margin-bottom: 30px;">
            <p>Company: 
                <select id="companySelect" style="padding: 5px; border-radius: 4px; border: 1px solid #ccc; font-weight: bold; cursor: pointer;">
                    <option value="Company A">Company A</option>
                    <option value="Company B">Company B</option>
                    <option value="Company C">Company C</option>
                </select>
            </p>
            <p>Total Tickets: <strong id="totalTicketsCount">0</strong></p>
            <p>Resolved: <strong id="resolvedTicketsCount">0</strong></p>
        </div>

        <hr style="border: 0.5px solid #999; margin-bottom: 20px;">

        <h3>Recent Tickets Log</h3>
        <table class="ticket-table">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Issue</th>
                    <th>Status</th>
                    <th>Technician</th>
                </tr>
            </thead>
            <tbody id="managementTableBody">
                <tr>
                    <td colspan="4" style="text-align: center;">Loading real-time data...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>

    <script>
        window.onload = async function() {
            // 1. Security Check
            if (sessionStorage.getItem("accessPermitted") !== "true") {
                alert("⚠️ Please enter the Access Code first.");
                window.location.href = "index.html";
                return;
            }

            // 2. Load Data gikan sa API
            await refreshManagementDashboard();
        }

        async function refreshManagementDashboard() {
            const tableBody = document.getElementById("managementTableBody");
            const totalLabel = document.getElementById("totalTicketsCount");
            const resolvedLabel = document.getElementById("resolvedTicketsCount");

            try {
                // Gamiton ang function sa api.js
                const tickets = await fetchTickets(); 

                if (tickets && tickets.length > 0) {
                    tableBody.innerHTML = ""; // Limpyohan ang sample data
                    
                    let resolvedCount = 0;

                    tickets.forEach(ticket => {
                        if (ticket.status === 'Resolved') resolvedCount++;

                        const row = `
                            <tr>
                                <td>${ticket.id}</td>
                                <td>${ticket.issue}</td>
                                <td><span class="status-${ticket.status.toLowerCase()}">${ticket.status}</span></td>
                                <td>${ticket.technician || "Not Assigned"}</td>
                            </tr>
                        `;
                        tableBody.innerHTML += row;
                    });

                    totalLabel.innerText = tickets.length;
                    resolvedLabel.innerText = resolvedCount;

                } else {
                    tableBody.innerHTML = "<tr><td colspan='4' style='text-align: center;'>No tickets found in database.</td></tr>";
                }
            } catch (error) {
                console.error("Error loading dashboard:", error);
                tableBody.innerHTML = "<tr><td colspan='4' style='text-align: center; color: red;'>Cannot connect to server.</td></tr>";
            }
        }
    </script>
</body>
</html>
