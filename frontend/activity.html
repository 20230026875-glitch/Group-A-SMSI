<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMSI - Activity Log</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">
            <img src="logo.png" alt="SMSI Logo">
        </div>
        <div class="nav-buttons">
            <a href="index.html" class="btn">Home</a>
            <a href="tickets.html" class="btn">Tickets Log</a>
            <a href="management.html" class="btn">Management</a>
            <a href="technician.html" class="btn">Technician</a>
            <a href="response.html" class="btn">Response</a>
            <a href="activity.html" class="btn active-page">Activity Log</a>
        </div>
    </nav>

    <div class="content">
        <h1>Activity Log</h1>
        
        <ul id="activityList" style="line-height: 2.0; font-size: 18px; margin-top: 20px; list-style-type: none; padding-left: 0;">
            <li><i style="color: gray;">Fetching latest activities...</i></li>
        </ul>
    </div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>

    <script>
        window.onload = async function() {
            // 1. Security Check
            if (sessionStorage.getItem("accessPermitted") !== "true") {
                alert("⚠️ Please enter the Access Code first.");
                window.location.href = "index.html";
                return;
            }

            // 2. Load the Activities
            await loadActivities();
        }

        async function loadActivities() {
            const activityList = document.getElementById("activityList");

            try {
                // Gamiton ang fetchTickets para himoong basehan sa log
                const tickets = await fetchTickets(); 

                if (tickets && tickets.length > 0) {
                    activityList.innerHTML = ""; // Limpyohan ang sample data

                    tickets.forEach(ticket => {
                        // Maghimo tag log entries base sa data sa ticket
                        const creationLog = `<li>📌 <b>Ticket #${ticket.id}</b> created - ${ticket.issue}</li>`;
                        const statusLog = `<li>⚙️ <b>Ticket #${ticket.id}</b> status updated to <span style="color: blue;">${ticket.status}</span></li>`;
                        
                        activityList.innerHTML += creationLog;
                        activityList.innerHTML += statusLog;
                    });
                } else {
                    activityList.innerHTML = "<li>No recent activities found.</li>";
                }
            } catch (error) {
                console.error("Error loading logs:", error);
                activityList.innerHTML = "<li style='color: red;'>❌ Error connecting to activity server.</li>";
            }
        }
    </script>

</body>
</html>
