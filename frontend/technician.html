<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMSI - Technician Assignment</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">
            <img src="logo.png" alt="SMSI Logo">
        </div>
        <div class="nav-buttons">
            <a href="index.html" class="btn">Home</a>
            <a href="tickets.html" class="btn">Tickets Log</a>
            <a href="management.html" class="btn">Management</a>
            <a href="technician.html" class="btn active-page">Technician</a>
            <a href="response.html" class="btn">Response</a>
            <a href="activity.html" class="btn">Activity Log</a>
        </div>
    </nav>

    <div class="content">
        <h1>Technician Assignment</h1>
        
        <table class="ticket-table">
            <thead>
                <tr>
                    <th>Name</th>
                    <th>Status</th>
                    <th>Current Load (Tickets)</th>
                </tr>
            </thead>
            <tbody id="technicianTableBody">
                <tr>
                    <td colspan="3" style="text-align: center;">Fetching technicians...</td>
                </tr>
            </tbody>
        </table>
    </div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>

    <script>
        window.onload = async function() {
            // Security check parehas sa Management
            if (sessionStorage.getItem("accessPermitted") !== "true") {
                alert("⚠️ Please enter the Access Code first.");
                window.location.href = "index.html";
                return;
            }

            await loadTechnicians();
        };

        async function loadTechnicians() {
            const tableBody = document.getElementById("technicianTableBody");

            try {
                // Manguha ta og data sa tickets para ma-ihap ang load sa tech
                const tickets = await fetchTickets(); 
                
                // Sample Technician List (Dapat unta ni naay laing API endpoint, 
                // pero sa pagkakaron, kuhaon nato ang mga unique names gikan sa tickets)
                const techData = {};

                if (tickets && tickets.length > 0) {
                    tickets.forEach(t => {
                        const name = t.technician || "Unassigned";
                        if (!techData[name]) {
                            techData[name] = { count: 0, status: "Active" };
                        }
                        techData[name].count++;
                    });

                    tableBody.innerHTML = ""; // Limpyohan ang table
                    
                    for (const name in techData) {
                        const row = `
                            <tr>
                                <td>${name}</td>
                                <td><span style="color: green; font-weight: bold;">${techData[name].status}</span></td>
                                <td>${techData[name].count}</td>
                            </tr>
                        `;
                        tableBody.innerHTML += row;
                    }
                } else {
                    tableBody.innerHTML = "<tr><td colspan='3' style='text-align: center;'>No technicians found.</td></tr>";
                }
            } catch (error) {
                console.error("Error loading technicians:", error);
                tableBody.innerHTML = "<tr><td colspan='3' style='text-align: center; color: red;'>Error connecting to server.</td></tr>";
            }
        }
    </script>
</body>
</html>
