<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMSI - Tickets Log</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">
            <img src="logo.png" alt="SMSI Logo">
        </div>
        <div class="nav-buttons">
            <a href="index.html" class="btn">Home</a>
            <a href="tickets.html" class="btn active-page">Tickets Log</a>
            <a href="management.html" class="btn">Management</a>
            <a href="technician.html" class="btn">Technician</a>
            <a href="response.html" class="btn">Response</a>
        </div>
    </nav>

    <div class="content">
        <h1>Tickets Log</h1>
        
        <button class="create-btn">Create Ticket</button>

        <table class="ticket-table" id="ticketTable">
            <thead>
                <tr>
                    <th>ID</th>
                    <th>Issue</th>
                    <th>Status</th>
                    <th>Technician</th>
                </tr>
            </thead>
            <tbody id="ticketTableBody">
                </tbody>
        </table>
    </div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>

    <script>
        async function loadTickets() {
            const tableBody = document.getElementById("ticketTableBody");
            
            try {
                // Tawgon ang fetchTickets gikan sa imong api.js
                const tickets = await fetchTickets(); 
                
                // Limpyohan ang table para dili magdoble
                tableBody.innerHTML = ""; 

                if (tickets.length === 0) {
                    tableBody.innerHTML = "<tr><td colspan='4'>No tickets found in database.</td></tr>";
                    return;
                }

                // I-loop ang matag ticket gikan sa database
                tickets.forEach(ticket => {
                    let row = tableBody.insertRow();
                    row.innerHTML = `
                        <td>${ticket.id || ticket.ticket_id}</td>
                        <td>${ticket.issue}</td>
                        <td>${ticket.status}</td>
                        <td>${ticket.technician || ticket.tech_name || 'N/A'}</td>
                    `;
                });
            } catch (error) {
                console.error("Error:", error);
                tableBody.innerHTML = "<tr><td colspan='4' style='color:red;'>❌ Error connecting to server.</td></tr>";
            }
        }

        // Modagan ni inig abli sa page
        window.onload = loadTickets;
    </script>

</body>
</html>
