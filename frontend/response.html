<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SMSI - Response Panel</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <nav class="navbar">
        <div class="logo">
            <img src="logo.png" alt="SMSI Logo">
        </div>
        <div class="nav-buttons">
            <a href="tickets.html" class="btn">Tickets Log</a>
            <a href="management.html" class="btn">Management</a>
            <a href="technician.html" class="btn">Technician</a>
            <a href="response.html" class="btn active-page">Response</a>
            <a href="activity.html" class="btn">Activity Log</a>
        </div>
    </nav>

    <div class="content">
        <h1>Response Panel</h1>
        
        <div class="form-container">
            <input type="text" id="ticketID" placeholder="Ticket ID (e.g., 1)" style="display: block; margin-bottom: 10px; width: 250px; padding: 5px;">
            
            <textarea id="responseText" placeholder="Write response..." rows="4" style="display: block; margin-bottom: 10px; width: 400px; padding: 5px;"></textarea>
            
            <button type="button" id="submitBtn" class="create-btn" onclick="handleResponse()">Submit</button>
            
            <p id="feedback" style="margin-top: 15px; font-weight: bold;"></p>
        </div>
    </div>

    <script src="js/config.js"></script>
    <script src="js/api.js"></script>

    <script>
        async function handleResponse() {
            const idInput = document.getElementById("ticketID").value;
            const responseInput = document.getElementById("responseText").value;
            const feedback = document.getElementById("feedback");
            const btn = document.getElementById("submitBtn");

            // 1. Basic Validation
            if (idInput === "" || responseInput === "") {
                feedback.style.color = "orange";
                feedback.innerHTML = "⚠️ Please fill in all fields.";
                return;
            }

            // Usbon ang hitsura sa button samtang nag-process
            btn.disabled = true;
            btn.innerText = "Sending...";
            feedback.innerHTML = "Connecting to server...";

            try {
                // 2. I-call ang function gikan sa api.js (Diri na ang tinuod nga database update)
                const result = await submitResponse(idInput, responseInput);

                if (result && result.success) {
                    feedback.style.color = "green";
                    feedback.innerHTML = "✅ Success! Ticket status updated to Responded.";
                    
                    // Clear inputs
                    document.getElementById("ticketID").value = "";
                    document.getElementById("responseText").value = "";
                } else {
                    feedback.style.color = "red";
                    feedback.innerHTML = "❌ Error: " + (result.message || "Ticket ID not found.");
                }
            } catch (error) {
                console.error("Submission error:", error);
                feedback.style.color = "red";
                feedback.innerHTML = "❌ Connection failed. Check if server is running.";
            } finally {
                btn.disabled = false;
                btn.innerText = "Submit";
            }
        }
    </script>
</body>
</html>
